    <style>
        /* БАЗОВЫЕ СТИЛИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* ЭКРАН ПОВОРОТА ТЕЛЕФОНА */
        #rotateScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #rotateScreen .rotate-icon {
            font-size: 80px;
            animation: rotatePhone 2s infinite;
        }
        
        @keyframes rotatePhone {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-90deg); }
            75% { transform: rotate(-90deg); }
        }
        
        #rotateScreen .rotate-text {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            text-align: center;
        }
        
        #rotateScreen .rotate-subtext {
            color: #888;
            font-size: 16px;
            margin-top: 10px;
        }
        
        /* ЭКРАНЫ */
        .menu, .screen {
            position: relative;
            z-index: 10;
            display: none;
            min-height: 100vh;
        }
        
        #mainMenu {
            display: flex;
        }
        
        /* МОДАЛЬНЫЕ ОКНА */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: none;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 350px;
            max-height: 80vh;
            overflow-y: auto;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid #ffd700;
            border-radius: 25px;
            padding: 25px;
            z-index: 201;
            display: none;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        
        /* УВЕДОМЛЕНИЯ */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 250;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        
        .notification {
            background: rgba(30,40,60,0.95);
            border-left: 4px solid #ffd700;
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
            animation: slideDown 0.3s;
            pointer-events: auto;
            cursor: pointer;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* ЧАСТИЦЫ */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>

<!-- 11. ГЛОБАЛЬНЫЕ ФУНКЦИИ -->
<script>
    // Закрытие модальных окон
    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }
    
    // Переключение экранов
    function showScreen(screenId) {
        document.querySelectorAll('.screen, #mainMenu').forEach(el => el.style.display = 'none');
        const target = document.getElementById(screenId);
        if (target) target.style.display = screenId === 'mainMenu' ? 'flex' : 'block';
    }
    
    // Форматирование чисел
    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }
    
    // Воспроизведение звука
    function playSound(type) {
        if (typeof window.playSound === 'function') window.playSound(type);
    }
    
    // Показ уведомления
    function showNotification(title, message, type = 'info') {
        const container = document.getElementById('notificationContainer');
        if (!container) return;
        
        const colors = { success: '#2ecc71', error: '#e74c3c', warning: '#f39c12', info: '#3498db' };
        
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.style.borderLeftColor = colors[type] || '#ffd700';
        notif.innerHTML = `
            <div style="font-weight:bold;color:${colors[type] || '#ffd700'}">${title}</div>
            <div style="font-size:13px;color:#ccc;margin-top:5px;">${message}</div>
        `;
        
        container.appendChild(notif);
        
        setTimeout(() => {
            notif.style.animation = 'slideDown 0.3s reverse';
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    }
    
    // Выход из игры
    function exitGame() {
        if (confirm('Выйти из игры?')) {
            if (typeof signOut === 'function') signOut();
            window.location.href = 'about:blank';
        }
    }
    
    // Глобальные функции
    window.closeModal = closeModal;
    window.showScreen = showScreen;
    window.formatNumber = formatNumber;
    window.playSound = playSound;
    window.showNotification = showNotification;
    window.exitGame = exitGame;
</script>

<!-- 12. ОРИЕНТАЦИЯ ЭКРАНА -->
<script>
    (function() {
        function checkOrientation() {
            const isLandscape = window.innerWidth > window.innerHeight;
            const rotateScreen = document.getElementById('rotateScreen');
            const mainMenu = document.getElementById('mainMenu');
            
            if (!isLandscape && window.deviceInfo?.isMobile) {
                if (rotateScreen) rotateScreen.style.display = 'flex';
                if (mainMenu) mainMenu.style.display = 'none';
            } else {
                if (rotateScreen) rotateScreen.style.display = 'none';
                if (mainMenu) mainMenu.style.display = 'flex';
            }
        }
        
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        document.addEventListener('DOMContentLoaded', checkOrientation);
    })();
</script>
